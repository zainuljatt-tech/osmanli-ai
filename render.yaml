services:
  - type: web
    name: osmanli-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: USE_SQLITE
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
